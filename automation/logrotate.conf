# User-mode logrotate config for berenstuff automation logs
# Run via: logrotate -s /config/berenstuff/automation/.logrotate.state /config/berenstuff/automation/logrotate.conf
# Cron: 15 3 * * * /bin/bash /config/berenstuff/automation/scripts/logrotate_run.sh >> /config/berenstuff/automation/logs/logrotate.log 2>&1

/config/berenstuff/automation/logs/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 50M
}
